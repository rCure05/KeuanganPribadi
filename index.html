<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rekap Financial Pastel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #FDF9F1; 
            --card-bg: #FFFFFF;
            --text-main: #4A4A4A; 
            --text-sub: #A0A0A0;
            --pastel-green: #A8D5BA;
            --pastel-red: #F2A6A6;
            --pastel-blue: #AECBFA;
            --pastel-purple: #BDB2FF; 
            --pastel-yellow: #FBE7A1; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; padding-bottom: 80px; }
        .container { max-width: 480px; margin: 0 auto; }
        .header { margin-bottom: 25px; }
        h1 { font-size: 24px; font-weight: 700; }
        .card { background-color: var(--card-bg); border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); }
        .summary-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .summary-box { background: #FAFAFA; padding: 12px 8px; border-radius: 20px; text-align: center; }
        .summary-title { font-size: 11px; color: var(--text-sub); font-weight: 600; margin-bottom: 5px; text-transform: uppercase; }
        .summary-amount { font-size: 14px; font-weight: 700; }
        .text-green { color: #57A673; } .text-red { color: #E06C6C; } .text-blue { color: #5B8BE3; }
        
        /* Chart Container */
        .chart-wrapper { width: 100%; max-width: 300px; margin: 0 auto 20px auto; }
        
        input, select { width: 100%; padding: 14px 16px; border: 2px solid #F0F0F0; border-radius: 16px; font-size: 15px; margin-bottom: 10px; }
        button { width: 100%; padding: 16px; background-color: var(--pastel-purple); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; }
        .btn-excel { background-color: var(--pastel-yellow); color: #B59B3C; margin-top: 10px; }
        .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px dashed #EAEAEA; }
        .t-left { display: flex; align-items: center; gap: 12px; }
        .t-icon { width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .icon-masuk { background-color: rgba(168, 213, 186, 0.3); } .icon-keluar { background-color: rgba(242, 166, 166, 0.3); } .icon-tabung { background-color: rgba(174, 203, 250, 0.3); }
        .t-info p { font-size: 14px; font-weight: 600; }
        .t-date { font-size: 11px; color: var(--text-sub); }
        .card-header { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>✨ RekapKu</h1></div>

    <div class="card">
        <h2 class="card-header" style="text-align: center; font-size: 14px;">Ringkasan Visual</h2>
        <div class="chart-wrapper">
            <canvas id="financialChart"></canvas>
        </div>
        <div class="summary-container">
            <div class="summary-box"><p class="summary-title">Masuk</p><p class="summary-amount text-green" id="tot-pemasukan">Rp 0</p></div>
            <div class="summary-box"><p class="summary-title">Keluar</p><p class="summary-amount text-red" id="tot-pengeluaran">Rp 0</p></div>
            <div class="summary-box"><p class="summary-title">Tabungan</p><p class="summary-amount text-blue" id="tot-tabungan">Rp 0</p></div>
        </div>
    </div>

    <div class="card">
        <h2 class="card-header">Catat Transaksi</h2>
        <form id="form-transaksi">
            <select id="jenis" required>
                <option value="Pemasukan">Pemasukan 💰</option>
                <option value="Pengeluaran">Pengeluaran 💸</option>
                <option value="Tabungan">Tabungan 🏦</option>
            </select>
            <input type="text" id="kategori" placeholder="Keterangan" required autocomplete="off">
            <input type="number" id="nominal" placeholder="Nominal (Rp)" required>
            <input type="date" id="tanggal" required>
            <button type="submit" id="btn-simpan">Simpan Data 🚀</button>
        </form>
    </div>

    <div class="card">
        <h2 class="card-header">Riwayat Terbaru</h2>
        <div id="list-transaksi"><p style="text-align: center;">Memuat data...</p></div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://fbetpczzpwbutmgxmqqy.supabase.co'; 
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZiZXRwY3p6cHdidXRtZ3htcXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMjc4OTgsImV4cCI6MjA5NTcwMzg5OH0.4X5va5WwRTPN-HkWD4uHWBzR680NrTTNKCy4PwjNKak';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    let myChart = null;

    document.getElementById('tanggal').value = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Jakarta' });

    const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

    async function loadData() {
        const { data, error } = await supabase.from('transaksi').select('*').order('tanggal', { ascending: false });
        if (error) return;

        let m = 0, k = 0, t = 0;
        data.forEach(item => {
            if (item.jenis === 'Pemasukan') m += Number(item.nominal);
            else if (item.jenis === 'Pengeluaran') k += Number(item.nominal);
            else t += Number(item.nominal);
        });

        document.getElementById('tot-pemasukan').innerText = formatRp(m);
        document.getElementById('tot-pengeluaran').innerText = formatRp(k);
        document.getElementById('tot-tabungan').innerText = formatRp(t);

        renderChart(m, k, t);
        renderList(data);
    }

    function renderChart(m, k, t) {
        const ctx = document.getElementById('financialChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Pemasukan', 'Pengeluaran', 'Tabungan'],
                datasets: [{ data: [m, k, t], backgroundColor: ['#A8D5BA', '#F2A6A6', '#AECBFA'] }]
            },
            options: { plugins: { legend: { position: 'bottom' } } }
        });
    }

    function renderList(data) {
        const listEl = document.getElementById('list-transaksi');
        listEl.innerHTML = '';
        data.slice(0, 5).forEach(item => {
            let style = item.jenis === 'Pemasukan' ? 'icon-masuk' : item.jenis === 'Pengeluaran' ? 'icon-keluar' : 'icon-tabung';
            listEl.innerHTML += `
                <div class="transaction-item">
                    <div class="t-left">
                        <div class="t-icon ${style}">${item.jenis[0]}</div>
                        <div class="t-info"><p>${item.kategori}</p><p class="t-date">${item.tanggal}</p></div>
                    </div>
                    <div class="t-amount" style="font-size: 13px;">${formatRp(item.nominal)}</div>
                </div>`;
        });
    }

    document.getElementById('form-transaksi').addEventListener('submit', async (e) => {
        e.preventDefault();
        const { error } = await supabase.from('transaksi').insert([{
            jenis: document.getElementById('jenis').value,
            kategori: document.getElementById('kategori').value,
            nominal: document.getElementById('nominal').value,
            tanggal: document.getElementById('tanggal').value
        }]);
        if (!error) {
            document.getElementById('form-transaksi').reset();
            loadData();
        }
    });

    loadData();
</script>
</body>
</html>
