<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rekap Financial Pastel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        :root {
            --bg-color: #FDF9F1; 
            --card-bg: #FFFFFF;
            --text-main: #4A4A4A; 
            --text-sub: #A0A0A0;
            --pastel-green: #A8D5BA;
            --pastel-red: #F2A6A6;
            --pastel-blue: #AECBFA;
            --pastel-purple: #BDB2FF; 
            --pastel-yellow: #FBE7A1; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            padding-bottom: 80px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 24px; 
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .summary-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .summary-box {
            background: #FAFAFA;
            padding: 12px 8px;
            border-radius: 20px;
            text-align: center;
        }

        .summary-title {
            font-size: 11px;
            color: var(--text-sub);
            font-weight: 600;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-amount {
            font-size: 15px;
            font-weight: 700;
            word-break: break-all;
        }

        .text-green { color: #57A673; }
        .text-red { color: #E06C6C; }
        .text-blue { color: #5B8BE3; }

        .form-group {
            margin-bottom: 16px;
        }

        .form-row {
            display: flex;
            gap: 10px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #F0F0F0;
            border-radius: 16px; 
            font-size: 15px;
            background-color: #F9F9F9;
            color: var(--text-main);
            transition: all 0.3s ease;
            outline: none;
            -webkit-appearance: none;
        }

        input:focus, select:focus {
            border-color: var(--pastel-purple);
            background-color: #FFF;
            box-shadow: 0 0 0 4px rgba(189, 178, 255, 0.15);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--pastel-purple);
            color: white;
            border: none;
            border-radius: 50px; 
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 6px 15px rgba(189, 178, 255, 0.4);
        }

        button:active {
            transform: scale(0.97); 
            box-shadow: 0 2px 8px rgba(189, 178, 255, 0.4);
        }

        .btn-excel {
            background-color: var(--pastel-yellow);
            color: #B59B3C;
            box-shadow: 0 6px 15px rgba(251, 231, 161, 0.5);
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px dashed #EAEAEA;
        }
        
        .transaction-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .t-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .t-icon {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .icon-masuk { background-color: rgba(168, 213, 186, 0.3); }
        .icon-keluar { background-color: rgba(242, 166, 166, 0.3); }
        .icon-tabung { background-color: rgba(174, 203, 250, 0.3); }

        .t-info p {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }

        .t-date {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        .t-amount {
            font-weight: 700;
            font-size: 14px;
        }

        .card-header {
            font-size: 18px; 
            font-weight: 700; 
            margin-bottom: 16px;
            color: var(--text-main);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>✨ RekapKu</h1>
    </div>

    <div class="card">
        <div class="summary-container">
            <div class="summary-box">
                <p class="summary-title">Masuk</p>
                <p class="summary-amount text-green" id="tot-pemasukan">Rp 0</p>
            </div>
            <div class="summary-box">
                <p class="summary-title">Keluar</p>
                <p class="summary-amount text-red" id="tot-pengeluaran">Rp 0</p>
            </div>
            <div class="summary-box">
                <p class="summary-title">Tabungan</p>
                <p class="summary-amount text-blue" id="tot-tabungan">Rp 0</p>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 class="card-header">Catat Transaksi</h2>
        <form id="form-transaksi">
            <div class="form-group">
                <label>Jenis Transaksi</label>
                <select id="jenis" required>
                    <option value="Pemasukan">Pemasukan 💰</option>
                    <option value="Pengeluaran">Pengeluaran 💸</option>
                    <option value="Tabungan">Tabungan 🏦</option>
                </select>
            </div>
            <div class="form-group">
                <label>Kategori / Keterangan</label>
                <input type="text" id="kategori" placeholder="Cth: Gaji, Kopi, Simpanan" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Nominal (Rp)</label>
                <input type="number" id="nominal" placeholder="0" required>
            </div>
            <div class="form-group">
                <label>Tanggal Transaksi</label>
                <input type="date" id="tanggal" required>
            </div>
            <button type="submit" id="btn-simpan">Simpan Data 🚀</button>
        </form>
    </div>

    <div class="card">
        <h2 class="card-header">Unduh Rekap Excel 📊</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Dari Tanggal</label>
                <input type="date" id="export-start" required>
            </div>
            <div class="form-group">
                <label>Sampai Tanggal</label>
                <input type="date" id="export-end" required>
            </div>
        </div>
        <button id="btn-export" class="btn-excel">Unduh Excel</button>
    </div>

    <div class="card">
        <h2 class="card-header">Riwayat Terbaru</h2>
        <div id="list-transaksi">
            <p style="color: #A0A0A0; font-size: 14px; text-align: center; padding: 20px 0;">Memuat data mutasi...</p>
        </div>
    </div>
</div>

<script>
    // --- 1. KONEKSI SUPABASE PROJECT BARU ---
    const supabaseUrl = 'https://jgjixdbnbzfpnvooczew.supabase.co'; 
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impnaml4ZGJuYnpmcG52b29jemV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTQ0OTEsImV4cCI6MjA5NjAzMDQ5MX0.npVGc6YPMWQYW8q1CvGDDluMlNsQarAtql433icPdx0';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Jakarta' });
    document.getElementById('tanggal').value = today;

    const formatRp = (angka) => {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
    };

    const getStyleData = (jenis) => {
        if(jenis === 'Pemasukan') return { icon: '💰', bgClass: 'icon-masuk', textClass: 'text-green', sign: '+' };
        if(jenis === 'Pengeluaran') return { icon: '💸', bgClass: 'icon-keluar', textClass: 'text-red', sign: '-' };
        return { icon: '🏦', bgClass: 'icon-tabung', textClass: 'text-blue', sign: '+' };
    };

    async function loadData() {
        const listEl = document.getElementById('list-transaksi');
        
        const { data, error } = await supabase
            .from('transaksi')
            .select('*')
            .order('tanggal', { ascending: false })
            .order('created_at', { ascending: false });

        if (error) {
            console.error(error);
            listEl.innerHTML = '<p style="color: var(--pastel-red); text-align:center;">Gagal memuat data!</p>';
            return;
        }

        listEl.innerHTML = ''; 
        let totMasuk = 0;
        let totKeluar = 0;
        let totTabungan = 0;

        if (data.length === 0) {
            listEl.innerHTML = '<p style="color: var(--text-sub); font-size: 14px; text-align: center; padding: 20px 0;">Belum ada catatan 📭</p>';
        } else {
            data.forEach(item => {
                let style = getStyleData(item.jenis);
                
                if(item.jenis === 'Pemasukan') totMasuk += Number(item.nominal);
                if(item.jenis === 'Pengeluaran') totKeluar += Number(item.nominal);
                if(item.jenis === 'Tabungan') totTabungan += Number(item.nominal);

                const displayDate = new Date(item.tanggal).toLocaleDateString('id-ID', {
                    day: 'numeric', month: 'short', year: 'numeric'
                });

                let div = document.createElement('div');
                div.className = 'transaction-item';
                div.innerHTML = `
                    <div class="t-left">
                        <div class="t-icon ${style.bgClass}">${style.icon}</div>
                        <div class="t-info">
                            <p>${item.kategori}</p>
                            <p class="t-date">${displayDate} • ${item.jenis}</p>
                        </div>
                    </div>
                    <div class="t-amount ${style.textClass}">
                        ${style.sign} ${formatRp(item.nominal)}
                    </div>
                `;
                listEl.appendChild(div);
            });
        }

        document.getElementById('tot-pemasukan').innerText = formatRp(totMasuk);
        document.getElementById('tot-pengeluaran').innerText = formatRp(totKeluar);
        document.getElementById('tot-tabungan').innerText = formatRp(totTabungan);
    }

    document.getElementById('form-transaksi').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        
        const btn = document.getElementById('btn-simpan');
        btn.innerText = 'Menyimpan... ⏳';
        btn.disabled = true;

        const jenis = document.getElementById('jenis').value;
        const kategori = document.getElementById('kategori').value;
        const nominal = document.getElementById('nominal').value;
        const tanggal = document.getElementById('tanggal').value; 

        const { error } = await supabase
            .from('transaksi')
            .insert([{ jenis, kategori, nominal, tanggal }]);

        if (error) {
            alert('Gagal menyimpan data ke database!');
            console.error(error);
        } else {
            document.getElementById('kategori').value = '';
            document.getElementById('nominal').value = '';
            await loadData();
        }

        btn.innerText = 'Simpan Data 🚀';
        btn.disabled = false;
    });

    document.getElementById('btn-export').addEventListener('click', async () => {
        const start = document.getElementById('export-start').value;
        const end = document.getElementById('export-end').value;

        if(!start || !end) {
            alert('Mohon pilih tanggal awal dan tanggal akhir terlebih dahulu!');
            return;
        }

        const btn = document.getElementById('btn-export');
        btn.innerText = 'Memproses... ⏳';

        const { data, error } = await supabase
            .from('transaksi')
            .select('*')
            .gte('tanggal', start)
            .lte('tanggal', end)
            .order('tanggal', { ascending: true });

        if (error) {
            alert('Gagal menarik data untuk excel!');
            btn.innerText = 'Unduh Excel';
            return;
        }

        if(data.length === 0) {
            alert('Tidak ada transaksi pada rentang tanggal tersebut.');
            btn.innerText = 'Unduh Excel';
            return;
        }

        const excelData = data.map((item, index) => {
            const wibSystemTime = new Intl.DateTimeFormat('id-ID', {
                timeZone: 'Asia/Jakarta',
                dateStyle: 'medium',
                timeStyle: 'medium'
            }).format(new Date(item.created_at));

            let nominalPrefix = item.jenis === 'Pengeluaran' ? -Math.abs(item.nominal) : Math.abs(item.nominal);

            return {
                "No": index + 1,
                "Tanggal Transaksi": item.tanggal,
                "Jenis": item.jenis,
                "Kategori/Keterangan": item.kategori,
                "Nominal (Rp)": nominalPrefix,
                "Waktu Tersimpan (WIB)": wibSystemTime
            };
        });

        const ws = XLSX.utils.json_to_sheet(excelData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Rekap_Keuangan");

        XLSX.writeFile(wb, `Rekap_${start}_sampai_${end}.xlsx`);
        btn.innerText = 'Unduh Excel';
    });

    loadData();
</script>

</body>
</html>
