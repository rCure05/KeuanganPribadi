<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pencatat Keuangan Pribadi</title>
    
    <meta name="theme-color" content="#F2F2F7">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        * { -webkit-tap-highlight-color: transparent; }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            60% { opacity: 1; transform: translateY(-3px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .animate-pop { opacity: 0; animation: popIn 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-500 { animation-delay: 0.5s; }
        .smooth-transition { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
    </style>
</head>
<body class="bg-[#F2F2F7] text-[#1C1C1E] min-h-screen flex justify-center sm:py-10">

    <div class="w-full max-w-md p-5 space-y-5">
        
        <div class="text-center pt-2 sm:pt-0 animate-pop">
            <h1 class="text-2xl font-bold tracking-tight">Keuangan Pribadi</h1>
            <p class="text-sm text-gray-500 mt-1" id="statusKoneksi">Menghubungkan ke server...</p>
        </div>

        <div class="bg-[#334155] text-white rounded-[24px] p-6 shadow-lg animate-pop delay-100 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-white/10 to-transparent pointer-events-none"></div>
            
            <p class="text-sm text-gray-300 mb-1 font-medium">Total Saldo Aktif</p>
            <h2 id="teksSaldo" class="text-3xl font-bold mb-5 tracking-tight">Rp 0</h2>
            
            <div class="flex justify-between text-sm border-t border-white/20 pt-4">
                <div>
                    <p class="text-gray-300 text-xs mb-1">Pemasukan</p>
                    <p id="teksTotalPemasukan" class="text-[#A7C957] font-bold">+ Rp 0</p>
                </div>
                <div class="text-right">
                    <p class="text-gray-300 text-xs mb-1">Pengeluaran</p>
                    <p id="teksTotalPengeluaran" class="text-[#E07A5F] font-bold">- Rp 0</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[20px] p-5 shadow-sm animate-pop delay-200">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-lg tracking-tight">Tabungan</h3>
                <button class="text-sm text-[#81B29A] font-semibold hover:text-green-700 transition active:scale-95 bg-green-50 px-3 py-1 rounded-full">+ Target</button>
            </div>
            <div>
                <div class="flex justify-between items-end mb-2">
                    <div>
                        <h4 class="text-[15px] font-semibold text-[#1C1C1E]">Dana Darurat</h4>
                        <p class="text-xs text-gray-500 mt-1">Terkumpul: Rp 2.000.000</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-1">Target 10Jt</p>
                        <p class="text-sm text-[#81B29A] font-bold">20%</p>
                    </div>
                </div>
                <div class="w-full bg-[#F2F2F7] rounded-full h-2.5 mb-4 overflow-hidden">
                    <div id="progressBar" class="bg-[#81B29A] h-2.5 rounded-full w-0 smooth-transition" style="transition-duration: 1.5s;"></div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[20px] p-5 shadow-sm animate-pop delay-300">
            <h3 class="font-semibold text-lg tracking-tight text-center mb-3">Arus Kas</h3>
            <div class="relative w-full h-44 flex justify-center">
                <canvas id="financeChart"></canvas>
            </div>
        </div>

        <div class="bg-white rounded-[20px] p-5 shadow-sm animate-pop delay-400">
            <h3 class="font-semibold text-lg tracking-tight mb-4">Transaksi Baru</h3>
            <form id="formTransaksi" class="space-y-4">
                
                <div class="flex bg-[#F2F2F7] p-1 rounded-xl relative">
                    <input type="hidden" id="inputTipe" value="pengeluaran">
                    
                    <button type="button" id="btnPengeluaran" onclick="setTipe('pengeluaran')" 
                        class="w-1/2 py-2 text-sm font-semibold rounded-lg smooth-transition bg-white text-[#E07A5F] shadow-sm transform scale-100">
                        Pengeluaran
                    </button>
                    <button type="button" id="btnPemasukan" onclick="setTipe('pemasukan')" 
                        class="w-1/2 py-2 text-sm font-semibold rounded-lg smooth-transition text-gray-500 bg-transparent transform scale-95">
                        Pemasukan
                    </button>
                </div>

                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-gray-400 font-medium">Rp</span>
                    <input type="number" id="inputNominal" placeholder="0" inputmode="numeric" required class="w-full bg-[#F2F2F7] rounded-xl p-3.5 pl-11 text-lg font-semibold focus:outline-none focus:ring-2 focus:ring-[#334155]/20 smooth-transition">
                </div>

                <div class="flex gap-3">
                    <input type="text" id="inputKategori" placeholder="Kategori" required class="w-1/2 bg-[#F2F2F7] rounded-xl p-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#334155]/20 smooth-transition">
                    <input type="date" id="inputTanggal" required class="w-1/2 bg-[#F2F2F7] rounded-xl p-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#334155]/20 smooth-transition">
                </div>
                
                <input type="text" id="inputCatatan" placeholder="Catatan Singkat (Opsional)" class="w-full bg-[#F2F2F7] rounded-xl p-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#334155]/20 smooth-transition">
                
                <button type="button" onclick="simpanTransaksi()" id="btnSimpan" class="w-full bg-[#334155] text-white font-semibold rounded-xl p-4 mt-2 transition-transform active:scale-[0.96] shadow-md">
                    Tambah Transaksi
                </button>
            </form>
        </div>

        <div class="pb-10 animate-pop delay-500">
            <div class="flex justify-between items-center mb-3 px-1">
                <h3 class="font-semibold text-lg tracking-tight">Semua Riwayat</h3>
            </div>
            
            <div id="containerRiwayat" class="bg-white rounded-[20px] overflow-hidden shadow-sm">
                <div class="p-4 text-center text-sm text-gray-500">Memuat data...</div>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. KONFIGURASI SUPABASE (UBAH BAGIAN INI)
        // ==========================================
        const SUPABASE_URL = 'https://jgjixdbnbzfpnvooczew.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impnaml4ZGJuYnpmcG52b29jemV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTQ0OTEsImV4cCI6MjA5NjAzMDQ5MX0.npVGc6YPMWQYW8q1CvGDDluMlNsQarAtql433icPdx0';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let myChart = null; // Menyimpan instance chart

        // Format Rupiah
        const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

        // ==========================================
        // 2. FUNGSI MENGAMBIL DATA DARI SUPABASE
        // ==========================================
        async function muatData() {
            document.getElementById('statusKoneksi').innerText = 'Sinkronisasi data...';

            // Ambil semua data dari tabel 'transactions', urutkan dari yang terbaru
            const { data, error } = await supabase
                .from('transactions')
                .select('*')
                .order('tanggal', { ascending: false });

            if (error) {
                console.error(error);
                document.getElementById('statusKoneksi').innerText = 'Gagal terhubung ke server ❌';
                return;
            }

            document.getElementById('statusKoneksi').innerText = 'Data tersinkronisasi ✅';
            
            renderDataUI(data);
        }

        // ==========================================
        // 3. FUNGSI MENYIMPAN KE SUPABASE
        // ==========================================
        async function simpanTransaksi() {
            const tipe = document.getElementById('inputTipe').value;
            const nominal = document.getElementById('inputNominal').value;
            const kategori = document.getElementById('inputKategori').value;
            const tanggal = document.getElementById('inputTanggal').value;
            const catatan = document.getElementById('inputCatatan').value;
            const btnSimpan = document.getElementById('btnSimpan');

            if(!nominal || !kategori || !tanggal) {
                alert("Harap isi Nominal, Kategori, dan Tanggal!");
                return;
            }

            btnSimpan.innerText = "Menyimpan...";
            btnSimpan.disabled = true;

            // Simpan ke database
            const { data, error } = await supabase
                .from('transactions')
                .insert([
                    { tipe: tipe, nominal: parseFloat(nominal), kategori: kategori, tanggal: tanggal, catatan: catatan }
                ]);

            if (error) {
                alert("Gagal menyimpan data!");
                console.error(error);
            } else {
                // Reset form
                document.getElementById('inputNominal').value = '';
                document.getElementById('inputKategori').value = '';
                document.getElementById('inputCatatan').value = '';
                
                // Muat ulang data
                muatData();
            }

            btnSimpan.innerText = "Tambah Transaksi";
            btnSimpan.disabled = false;
        }

        // ==========================================
        // 4. MENGUBAH TAMPILAN BERDASARKAN DATA (UI)
        // ==========================================
        function renderDataUI(transaksiData) {
            let totalMasuk = 0;
            let totalKeluar = 0;
            const container = document.getElementById('containerRiwayat');
            container.innerHTML = ''; // Bersihkan kontainer

            if(transaksiData.length === 0) {
                container.innerHTML = '<div class="p-4 text-center text-sm text-gray-500">Belum ada transaksi</div>';
            }

            transaksiData.forEach((trx) => {
                // Hitung Saldo
                if(trx.tipe === 'pemasukan') totalMasuk += parseFloat(trx.nominal);
                else totalKeluar += parseFloat(trx.nominal);

                // Buat Elemen Daftar (List) Khas iOS
                const isMasuk = trx.tipe === 'pemasukan';
                const warnaTeks = isMasuk ? 'text-[#A7C957]' : 'text-[#E07A5F]';
                const simbol = isMasuk ? '+' : '-';
                const ikonBg = isMasuk ? 'bg-green-50' : 'bg-red-50';
                const emoji = isMasuk ? '💰' : '💸';

                const htmlItem = `
                <div class="flex justify-between items-center p-4 border-b border-gray-50 active:bg-gray-50 smooth-transition">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full ${ikonBg} flex items-center justify-center text-xl">${emoji}</div>
                        <div>
                            <p class="text-[15px] font-semibold text-[#1C1C1E] capitalize">${trx.kategori}</p>
                            <p class="text-[13px] text-gray-400 mt-0.5">${trx.tanggal} ${trx.catatan ? '• '+trx.catatan : ''}</p>
                        </div>
                    </div>
                    <p class="text-[15px] font-bold ${warnaTeks}">${simbol} ${formatRupiah(trx.nominal)}</p>
                </div>
                `;
                container.innerHTML += htmlItem;
            });

            // Update Teks Ringkasan
            document.getElementById('teksSaldo').innerText = formatRupiah(totalMasuk - totalKeluar);
            document.getElementById('teksTotalPemasukan').innerText = '+ ' + formatRupiah(totalMasuk);
            document.getElementById('teksTotalPengeluaran').innerText = '- ' + formatRupiah(totalKeluar);

            // Update Grafik (Chart)
            renderChart(totalMasuk, totalKeluar);
        }

        // ==========================================
        // 5. RENDER GRAFIK CHART.JS
        // ==========================================
        function renderChart(pemasukan, pengeluaran) {
            const ctx = document.getElementById('financeChart').getContext('2d');
            
            // Hancurkan chart lama jika ada agar tidak menumpuk
            if(myChart !== null) myChart.destroy();

            // Cegah error jika data kosong (0)
            const dataToRender = (pemasukan === 0 && pengeluaran === 0) ? [1, 1] : [pemasukan, pengeluaran];
            const warnaBackground = (pemasukan === 0 && pengeluaran === 0) ? ['#E5E7EB', '#E5E7EB'] : ['#A7C957', '#E07A5F'];

            Chart.defaults.animation.easing = 'easeOutBounce';
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Pemasukan', 'Pengeluaran'],
                    datasets: [{
                        data: dataToRender,
                        backgroundColor: warnaBackground,
                        borderWidth: 4, borderColor: '#FFFFFF', hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '75%',
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(28, 28, 30, 0.8)', padding: 12, cornerRadius: 10,
                            callbacks: {
                                label: function(context) {
                                    if(pemasukan === 0 && pengeluaran === 0) return " Belum ada data";
                                    return ' ' + formatRupiah(context.raw);
                                }
                            }
                        }
                    }
                }
            });
        }

        // ==========================================
        // 6. UI LOGIC TAMBAHAN (Warna Tombol, dll)
        // ==========================================
        function setTipe(tipe) {
            const btnPengeluaran = document.getElementById('btnPengeluaran');
            const btnPemasukan = document.getElementById('btnPemasukan');
            document.getElementById('inputTipe').value = tipe;

            if (tipe === 'pengeluaran') {
                btnPengeluaran.className = "w-1/2 py-2 text-sm font-semibold rounded-lg smooth-transition bg-white text-[#E07A5F] shadow-sm transform scale-100";
                btnPemasukan.className = "w-1/2 py-2 text-sm font-semibold rounded-lg smooth-transition text-gray-500 bg-transparent transform scale-95 hover:text-gray-700";
            } else {
                btnPemasukan.className = "w-1/2 py-2 text-sm font-semibold rounded-lg smooth-transition bg-white text-[#A7C957] shadow-sm transform scale-100";
                btnPengeluaran.className = "w-1/2 py-2 text-sm font-semibold rounded-lg smooth-transition text-gray-500 bg-transparent transform scale-95 hover:text-gray-700";
            }
        }

        // Dijalankan saat halaman pertama kali dibuka
        document.addEventListener('DOMContentLoaded', function() {
            // Set input tanggal ke hari ini secara default
            document.getElementById('inputTanggal').valueAsDate = new Date();
            
            // Animasi Progress Bar Tabungan
            setTimeout(() => { document.getElementById('progressBar').style.width = '20%'; }, 300);

            // MULAI TARIK DATA DARI SUPABASE!
            muatData();
        });
    </script>
</body>
</html>
